hashx:
  key1: val1
  key2: val2
arrx: 
  - arr1
  - arr2
text: "&#x74;ext2"
get: "ABC"
edition: "édition"
hash_liquid:
  key1: A {{ var1 }} B
text_liquid: C {{var2}} D {{var3}} E
man_liquid: "{{ 'Man' | inflect: 'case:acc' }}"
women_liquid: "{{ 'Woman' | inflect: 'number:pl, case:gen' }}"
woman_liquid: "{{ labels['woman'] | inflect: 'case:gen' }}"
woman2_liquid: "{{ labels['woman'] | inflect: 'case:abl' }}"
ordinal_num_blank_blank: "{{ var1 | ordinal_num: '', '' }}"
ordinal_word_blank_blank: "{{ var1 | ordinal_word: '', '' }}"
ordinal_num_man_blank: "{{ var1 | ordinal_num: 'man', '' }}"
ordinal_word_man_blank: "{{ var1 | ordinal_word: 'man', '' }}"
ordinal_num_woman_blank: "{{ var1 | ordinal_num: 'woman', '' }}"
ordinal_word_woman_blank: "{{ var1 | ordinal_word: 'woman', '' }}"
ordinal_num_blank_nsg: "{{ var1 | ordinal_num: '', 'gender:f,number:pl' }}"
ordinal_word_blank_nsg: "{{ var1 | ordinal_word: '', 'gender:f,number:pl' }}"
ordinal_num_masc_pl: "{{ var1 | ordinal_num: 'man', 'number:pl' }}"
ordinal_word_masc_pl: "{{ var1 | ordinal_word: 'man', 'number:pl' }}"
# Format strings with %E*[…]/%O*[…] tokens inline cleanly in Liquid; square
# brackets do not clash with the {{...}} template delimiters. Centralising
# format strings as labels.<key> still matches the realistic flavour-gem
# usage pattern, so most fixtures take that route.
fmt_ja_arabic: "%EY[numeric]年%-m月%-d日"
fmt_ja_spellout: "%EY[spellout]年%Om[spellout]月%Od[spellout]日"
date_i18n_plain: "{{ var1 | date_i18n: '%Y-%m-%d' }}"
date_i18n_long_en: "{{ var1 | date_i18n: '%-d %B %Y' }}"
date_i18n_roman_month: "{{ var1 | date_i18n: '%-d.%Om[roman].%Y' }}"
date_i18n_ja_arabic: "{{ var1 | date_i18n: labels.fmt_ja_arabic, 'ja' }}"
date_i18n_ja_spellout: "{{ var1 | date_i18n: labels.fmt_ja_spellout, 'ja' }}"
date_i18n_calendar_override: "{{ var1 | date_i18n: labels.fmt_ja_arabic, 'ja', 'japanese' }}"
date_i18n_empty: "[{{ var1 | date_i18n: '%Y-%m-%d' }}]"
multiple_and: "%1<conn>與</conn>%2"
ordinal_keys: [gender,number]
SpelloutRules:
  m.sg: spellout-ordinal-masculine
  f.sg: spellout-ordinal-feminine
  m.pl: spellout-ordinal-masculine-plural
  f.pl: spellout-ordinal-feminine-plural
OrdinalRules:
  m.sg: digits-ordinal-masculine
  f.sg: digits-ordinal-feminine
  m.pl: digits-ordinal-masculine-plural
  f.pl: digits-ordinal-feminine-plural
woman: Woman
man: Man
inflection:
  Fred:
    sg: Fred
    pl: Freds
  Man:
    dat: viri
    acc: virem
    grammar:
      gender: m
  Woman:
    sg:
      nom: mulier
      gen: mulieris
    pl:
      nom: mulieres
      gen: mulierum
    grammar:
      gender: f
  Good:
    sg:
      nom:
        m: bonus
        f: bona
        n: bonum
      gen:
        m: boni
        f: bonae
        n: boni
    pl:
      nom:
        m: boni
        f: bonae
        n: bona
      gen:
        m: bonorum
        f: bonarum
        n: bonorum
  Walk:
    act:
      ind:
        pres:
          sg:
            1st: ambulo
            2nd: ambulas
      subj:
        pres:
          pl:
            1st: ambulemus
            2nd: ambuletis

